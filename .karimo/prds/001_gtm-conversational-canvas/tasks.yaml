tasks:
  - id: T1
    title: "Add Ollama provider to providers.ts + env wiring"
    complexity: 3
    priority: must
    depends_on: []
    files:
      - src/lib/ai/providers.ts
      - .env.example
      - package.json
    acceptance_criteria:
      - "ollama-ai-provider installed (npm)"
      - "createOllama() exported from src/lib/ai/providers.ts with env fallback (OLLAMA_HOST → http://localhost:11434, OLLAMA_API_KEY for Cloud)"
      - "Smoke test: a one-shot generateText call to qwen2.5-coder:32b returns text"
      - "Default model documented: qwen2.5-coder:32b local; deepseek-v4-flash on Ollama Cloud"

  - id: T2
    title: "Create gtm_artifacts Supabase table + types"
    complexity: 3
    priority: must
    depends_on: []
    files:
      - supabase/migrations/{timestamp}_create_gtm_artifacts.sql
      - src/lib/types/gtm-artifact.ts
    acceptance_criteria:
      - "Table columns: id (uuid pk), run_id (text fk → gtm_runs.run_id ON DELETE CASCADE), skill (text), version (int, default 1), parent_id (uuid nullable self-fk), content_md (text), source (enum: 'skill_output' | 'agent_patch'), created_by (text — user_id or 'orchestrator'), metadata (jsonb default '{}'), created_at (timestamptz)"
      - "Unique index on (run_id, skill, version)"
      - "RLS enabled. Policy: select/insert if user owns parent gtm_run via clerk user_id text join (mirror gtm_runs RLS pattern from migration_20260430)"
      - "TS types generated and importable"
      - "Migration applied to local + production via Supabase MCP"

  - id: T3
    title: "Narrow .claude/rules/ai-sdk-patterns.md provider allowlist"
    complexity: 2
    priority: must
    depends_on: []
    files:
      - .claude/rules/ai-sdk-patterns.md
    acceptance_criteria:
      - "Rule explicitly allows ollama-ai-provider for orchestrator chat in src/lib/ai/orchestrator.ts and src/app/api/gtm/runs/[runId]/chat/route.ts"
      - "Rule reaffirms anthropic + perplexity only for skill bodies (skills/*, research-worker/src/runners/)"
      - "Rationale captured: cost split — cheap orchestrator brain, paid skill brains"

  - id: T4
    title: "Per-skill JSON-to-MD render templates"
    complexity: 5
    priority: must
    depends_on: [T2]
    files:
      - src/lib/gtm/render-md.ts
      - src/lib/gtm/render-md.test.ts
    acceptance_criteria:
      - "Function renderSkillOutputToMd(skill, output): string for each of 5 lighthouse skills (ingest-url, ingest-identity, research-market, research-competitor, research-icp) — matches canonical LIGHTHOUSE_5 in src/lib/gtm/dispatch-skill.ts"
      - "Templates include: H2 skill name, Summary section, structured field rendering (e.g. ICP table), Evidence subsections with source URLs, source-gap callouts"
      - "Idempotent: same JSON produces same MD"
      - "Unit tests: snapshot test per skill using fixtures from skills/*/example/"

  - id: T5
    title: "Orchestrator tool definitions (Zod schemas)"
    complexity: 5
    priority: must
    depends_on: [T2]
    files:
      - src/lib/gtm/orchestrator-tools.ts
      - src/lib/gtm/orchestrator-tools.test.ts
    acceptance_criteria:
      - "Three tools defined with inputSchema (Zod) and execute(): dispatch_skill(skill, refinement_context?), patch_artifact(artifact_id, instruction), classify_intent(user_message)"
      - "dispatch_skill calls existing /api/gtm/runs/:id/dispatch route (no worker changes)"
      - "patch_artifact: invokes Ollama with current content_md + instruction → writes new gtm_artifacts row v+1"
      - "classify_intent returns one of: 'rerun_skill' | 'patch_artifact' | 'ask_question' | 'no_action'"
      - "All tools use AI SDK v6 patterns: inputSchema (NOT parameters), maxOutputTokens"

  - id: T6
    title: "Orchestrator chat agent loop"
    complexity: 8
    priority: must
    depends_on: [T1, T4, T5]
    files:
      - src/lib/ai/orchestrator.ts
      - src/lib/ai/orchestrator.test.ts
    acceptance_criteria:
      - "runOrchestrator(messages, runId) async generator streams text deltas + tool-call events"
      - "Sanitizes incomplete tool parts before convertToModelMessages() (per learned-patterns.md)"
      - "On dispatch_skill tool result: calls renderSkillOutputToMd, inserts gtm_artifacts row v1"
      - "On patch_artifact tool result: inserts new gtm_artifacts row vN+1 with parent_id of previous"
      - "Hardcoded DAG order from src/lib/skills/route-table.ts respected when user asks 'run the full pipeline'"
      - "Unit tests: mocked Ollama + mocked Supabase verify the loop dispatches skills in order, writes artifacts, handles patch/rerun branching"

