      - "Clerk auth check, run ownership check (mirror dispatch route pattern)"
      - "Calls runOrchestrator, returns toUIMessageStreamResponse() (DefaultChatTransport-compatible)"
      - "export const maxDuration = 300 (Vercel Pro)"
      - "Unit test: 200 happy path, 401 unauth, 403 not-owner"

