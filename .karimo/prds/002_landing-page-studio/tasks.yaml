    acceptance:
      - YAML frontmatter - name, description (~150 chars, trigger-rich)
      - Description mentions - landing page, BrandSpec, design directions, when to invoke
      - Body documents - input schema (BrandSpec), workflow (plan -> generate -> tweak), output structure
      - Includes - "How an agent uses this skill" section with 3 example flows
      - Includes - reference to scripts/ for actual execution
      - Loadable in a fresh Claude Code session via Skill tool

  - id: T13
    title: Example BrandSpec + golden output fixture
    complexity: 2
    priority: must
    depends_on: [T10]
    files:
      - skills/landing-page-studio/example/brief.json
      - skills/landing-page-studio/example/output/
    acceptance:
      - example/brief.json is a real BrandSpec (DealFlow-style or similar SaaS)
      - Validates against contracts/brand-spec.ts schema
      - Running "full" command on this brief produces output that all 3 directions pass QA gates
      - Resulting directions.json + 3 HTML files committed to example/output/
      - HTML files render in a browser without console errors
      - Acts as smoke test fixture for future PRDs that touch this skill

  - id: T14
    title: README + Google Fonts allowlist + direction docs
    complexity: 3
    priority: should
    depends_on: [T3]
    files:
      - skills/landing-page-studio/README.md
      - skills/landing-page-studio/references/google-fonts.json
      - skills/landing-page-studio/references/directions.md
    acceptance:
      - README - quickstart (npx tsx invocation), env vars (ANTHROPIC_API_KEY, OLLAMA_API_KEY), output structure, troubleshooting
      - google-fonts.json - curated allowlist of ~40 font pairs (display + body), each with category (sans, serif, mono, display)
      - directions.md - human-readable docs of the 15 directions from T3, with one screenshot reference per direction (text reference only - no image files)
      - All three files have a header noting last-updated date

  - id: T15
    title: Add deprecation banner to skills/landing-page/README.md
    complexity: 1
    priority: could
    depends_on: [T13]
    files:
      - skills/landing-page/README.md
    acceptance:
      - First section after title is a deprecation banner pointing to skills/landing-page-studio/
      - Banner explains - new skill is the maintained path, old skill stays operational for production callers until PRD #003 ships
