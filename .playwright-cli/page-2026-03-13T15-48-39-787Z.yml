                        - text: "**Content + Community Presence**: 10% of budget to Reddit (r/SaaS, r/startups), HackerNews, Indie Hackers—organic + light sponsorship to build thought leadership. Address pain points (MQL-to-SQL conversion, retention metrics, attribution) where SaaS founders congregate."
